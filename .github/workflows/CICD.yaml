name: CI/CD

on:
  pull_request:
    paths:
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login DockerHub
      run: echo ${{ secrets.DH_TOKEN }} | docker login -u ${{ secrets.DH_USUARIO }} --password-stdin

    - name: Build image
      run: docker build -t ${{ secrets.DH_USUARIO }}/tipoexamen:latest .

    - name: Push image
      run: docker push ${{ secrets.DH_USUARIO }}/tipoexamen:latest

  deploy:
    needs: build  
    runs-on: ubuntu-latest

    steps:
    - name: Deploy AWS
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.AMZ_IP }}
        username: ${{ secrets.AMZ_USUARIO }}
        key: ${{ secrets.AMZ_CLAVE }}
        script: |
          docker pull ${{ secrets.DH_USUARIO }}/tipoexamen:latest
          docker stop fastapi || true
          docker rm fastapi || true
          docker run -d -p 80:8000 --name fastapi ${{ secrets.DH_USUARIO }}/tipoexamen:latest